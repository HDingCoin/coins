<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泉府藏泉大展厅</title>
    <style>
        body { font-family: 'PingFang SC', sans-serif; background: #f4f1ea; color: #333; margin: 15px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #8c2d19; padding-bottom: 10px; margin-bottom: 15px; }
        h1 { color: #8c2d19; margin: 0; font-size: 24px; font-weight: bold; }
        .nav-btn { background: #8c2d19; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 13px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .toolbar { background: #fff; padding: 10px; border-radius: 6px; margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .sort-select { padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; }
        
        .coin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; padding: 0; }
        @media(min-width: 600px) { .coin-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }
        
        .coin-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; border: 1px solid #eaeaea; cursor: pointer; }
        .coin-card:hover { transform: translateY(-4px); box-shadow: 0 6px 15px rgba(140,45,25,0.15); border-color: #8c2d19; }
        
        .img-container { width: 100%; padding-top: 100%; position: relative; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
        .img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .no-img { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ccc; font-size: 13px; }
        
        .coin-info { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; }
        .coin-title { font-size: 14px; font-weight: bold; color: #333; margin: 0 0 6px 0; line-height: 1.4; height: 38px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price-tag { font-size: 15px; font-weight: bold; color: #b13d25; }
        .platform-tag { background: #eee; padding: 1px 5px; border-radius: 3px; font-size: 10px; color: #666; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: #fff; width: 92%; max-width: 750px; max-height: 90vh; border-radius: 12px; overflow-y: auto; padding: 20px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 26px; color: #999; cursor: pointer; }
        .modal-title { color: #8c2d19; border-bottom: 2px solid #8c2d19; padding-bottom: 8px; margin-top: 0; font-size: 18px; }
        
        .modal-images { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        @media(min-width: 500px) { .modal-images { flex-direction: row; justify-content: space-between; } }
        .modal-img-box { width: 100%; text-align: center; }
        @media(min-width: 500px) { .modal-img-box { width: 32%; } }
        .modal-img-box img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; }
        .modal-img-box span { display: block; margin-top: 4px; font-size: 11px; color: #666; font-weight: bold; }
        
        .modal-details { display: grid; grid-template-columns: 1fr; gap: 10px; background: #faf8f5; padding: 12px; border-radius: 6px; border: 1px solid #f0ede7; }
        @media(min-width: 500px) { .modal-details { grid-template-columns: 1fr 1fr; } }
        .detail-item { font-size: 13px; }
        .detail-item strong { color: #555; }
        .detail-item.full-width { grid-column: 1 / -1; border-top: 1px dashed #ddd; padding-top: 8px; }
        .modal-price { font-size: 18px; color: #b13d25; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h1>🪙 泉府遗珍 · 个人收藏展厅</h1>
            <a href="/admin.html" class="nav-btn" id="adminBtn">⚙️ 进入后台</a>
        </div>
        <div class="toolbar">
            <span>排序：</span>
            <select id="sortOrder" class="sort-select" onchange="renderCoins()">
                <option value="dateDesc">日期从新到旧</option>
                <option value="dateAsc">日期从旧到新</option>
                <option value="priceDesc">价格从高到低</option>
                <option value="priceAsc">价格从低到高</option>
            </select>
        </div>
        <div id="coinGrid" class="coin-grid"></div>
    </div>

    <div id="coinModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="mTitle" class="modal-title">钱币详情</h2>
            <div class="modal-images">
                <div class="modal-img-box"><img id="mImgObverse" src=""><span>正面 (Obverse)</span></div>
                <div class="modal-img-box"><img id="mImgReverse" src=""><span>反面 (Reverse)</span></div>
                <div class="modal-img-box"><img id="mImgEdge" src=""><span>边齿 (Edge)</span></div>
            </div>
            <div class="modal-details">
                <div class="detail-item"><strong>成交价格：</strong><span id="mPrice" class="modal-price"></span></div>
                <div class="detail-item"><strong>来源平台：</strong><span id="mPlatform"></span></div>
                <div class="detail-item"><strong>尺寸参数：</strong><span id="mSize"></span></div>
                <div class="detail-item"><strong>入库日期：</strong><span id="mDate"></span></div>
                <div class="detail-item full-width"><strong>描述备注：</strong><br><span id="mNotes" style="color:#666; white-space: pre-wrap;"></span></div>
            </div>
        </div>
    </div>

    <script>
        let cachedCoins = [];
        
        // ✨ 【核心升级】：双模数据读取逻辑，完美兼容本地有后端和云端纯静态
        function loadCoins() {
            // 先尝试走本地 Python API
            fetch('/api/coins')
            .then(res => {
                if(!res.ok) throw new Error('Not server');
                return res.json();
            })
            .then(data => {
                cachedCoins = data;
                renderCoins();
            })
            .catch(err => {
                // 如果没有运行 Python 后端（比如在 GitHub 上或者直接点开），则全自动去读同目录下的物理 json 账本！
                console.log("正在切换至纯静态云端账本模式...");
                // 在纯外网静态状态下，隐藏后台管理入口按钮避免误触
                if(document.getElementById('adminBtn')) document.getElementById('adminBtn').style.display = 'none';
                
                fetch('coins_data.json')
                .then(res => res.json())
                .then(data => {
                    cachedCoins = data;
                    renderCoins();
                })
                .catch(e => {
                    document.getElementById('coinGrid').innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#999; padding:50px;">未找到有效的账本数据文件。</div>';
                });
            });
        }

        function renderCoins() {
            const gridContainer = document.getElementById('coinGrid');
            gridContainer.innerHTML = '';
            if (cachedCoins.length === 0) {
                gridContainer.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#999; padding:50px;">暂无藏品。</div>';
                return;
            }
            const sortOrder = document.getElementById('sortOrder').value;
            let sortedCoins = [...cachedCoins];
            sortedCoins.sort((a, b) => {
                if (sortOrder === 'dateDesc') return new Date(b.date || '1970-01-01') - new Date(a.date || '1970-01-01');
                if (sortOrder === 'dateAsc') return new Date(a.date || '1970-01-01') - new Date(b.date || '1970-01-01');
                if (sortOrder === 'priceDesc') return parseFloat(b.price || 0) - parseFloat(a.price || 0);
                if (sortOrder === 'priceAsc') return parseFloat(a.price || 0) - parseFloat(b.price || 0);
                return 0;
            });
            sortedCoins.forEach(coin => {
                const card = document.createElement('div');
                card.className = 'coin-card';
                card.onclick = () => openModal(coin);
                
                // 修复云端图片路径读取
                let fixImgPath = (p) => {
                    if(!p) return '';
                    return p.startsWith('/') ? p.substring(1) : p;
                };

                let imgHtml = coin.obverse_img ? `<img src="${fixImgPath(coin.obverse_img)}">` : `<span class="no-img">暂无正面图</span>`;
                card.innerHTML = `<div class="img-container">${imgHtml}</div><div class="coin-info"><h3 class="coin-title">${coin.name || '未命名'}</h3><div class="price-row"><span class="price-tag">${coin.price || '0.00'} ${coin.currency || ''}</span><span class="platform-tag">${coin.platform || '未知'}</span></div></div>`;
                gridContainer.appendChild(card);
            });
        }
        function openModal(coin) {
            let fixImgPath = (p) => {
                if(!p) return 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100%" height="100%" fill="%23f2f2f2"/><text x="50%" y="55%" font-size="12" fill="%23aaa" text-anchor="middle">未上传</text></svg>';
                return p.startsWith('/') ? p.substring(1) : p;
            };
            document.getElementById('mTitle').innerText = coin.name || '未命名';
            document.getElementById('mPrice').innerText = `${coin.price || '0.00'} ${coin.currency || ''}`;
            document.getElementById('mPlatform').innerText = coin.platform || '-';
            document.getElementById('mSize').innerText = coin.size || '-';
            document.getElementById('mDate').innerText = coin.date || '-';
            document.getElementById('mNotes').innerText = coin.notes || '无';
            document.getElementById('mImgObverse').src = fixImgPath(coin.obverse_img);
            document.getElementById('mImgReverse').src = fixImgPath(coin.reverse_img);
            document.getElementById('mImgEdge').src = fixImgPath(coin.edge_img);
            document.getElementById('coinModal').classList.add('active');
        }
        function closeModal() { document.getElementById('coinModal').classList.remove('active'); }
        window.onkeydown = function(e) { if (e.keyCode === 27) closeModal(); };
        loadCoins();
    </script>
</body>
</html>
